<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ja" lang="ja">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <title>朝6 予定表</title>
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.1/css/all.css">
  <style type="text/css">
    body {
      font-family: Helvetica, 'Helvetica Neue', 'Mplus 1p', 'Hiragino Kaku Gothic Pro', 'ヒラギノ角ゴ Pro W3', Meiryo, メイリオ, Osaka, 'MS PGothic' !important;
      font-size: 16px;
    }
    div.app {
      margin: 20px;
      padding: 20px;
    }
    /* スマホで見やすくするための調整 */
    .table-container {
      overflow-x: auto;
    }
  </style>
</head>

<body class="hold-transition fixed skin-blue-light sidebar-mini ">
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <div class="wrapper">
    <div class="container">
      <div class="row">
        <div class="col-xs-12">
          <div id="app">
            <br>
            <div>
              <h4>朝6 予定表(多摩川 6-8時)</h4>
            </div>

            <section v-if="errored">
              <p>データの読み込みに失敗しました。後ほど再度お試しください。</p>
            </section>

            <section v-else>
              <div v-if="loading">Loading...</div>

              <div v-else class="table-container">
                <table class="table table-striped">
                  <thead>
                    <tr>
                      <th>日程</th>
                      <th>コート</th>
                      <th>予約者</th>
                      <th>メモ</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="(item, index) in items" :key="index">
                      <td>{{ item.date }}</td>
                      <td>{{ item.court }}</td>
                      <td>{{ item.name }}</td>
                      <td>{{ item.memo }}</td>
                    </tr>
                  </tbody>
                </table>
                <div class="text-right">
                   <small>データ取得日: {{ update }}</small>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          update: null,
          loading: true,
          errored: false,
          items: []
        };
      },
      mounted() {
        // 同じリポジトリ内のdata.jsonを取得
        axios.get("./data.json")
          .then(response => {
            const rawData = response.data;
            
            if (Array.isArray(rawData) && rawData.length > 1) {
              // 1行目が ["date","court","name","memo"] のようなヘッダーであることを想定
              // 2行目以降をオブジェクトの配列に変換
              const headers = rawData;
              this.items = rawData.slice(1).map(row => {
                return {
                  date: row || '',
                  court: row || '',
                  name: row || '',
                  memo: row || ''
                };
              });
            }

            // 更新日の表示（現在はアクセスした日時を表示）
            const now = new Date();
            this.update = now.toLocaleString('ja-JP', {
              year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit', hour12: false
            });

          })
          .catch(error => {
            console.error(error);
            this.errored = true;
          })
          .finally(() => this.loading = false);
      }
    });
  </script>
</body>
</html>
